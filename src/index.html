<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PoolTerminal</title>
    <link rel="stylesheet" href="styles/design-tokens.css" />
    <link rel="stylesheet" href="styles/app.css" />
    <link rel="stylesheet" href="styles/components.css" />
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>

    <div id="pt-app">

      <div class="pt-tickertape" id="pt-tickertape">
        <span class="pt-ticker-name">GNP1</span>
        <span class="pt-ticker-role" id="ttape-role" style="display:none"></span>
        <span class="pt-ticker-val" id="ttape-nodever" style="display:none; margin-left:8px; color:#4ade80; font-weight:700; font-size:12px;"></span>
        <span class="pt-ticker-sep">│</span>
        <span class="pt-ticker-val" id="ttape-net">—</span>
        <span class="pt-ticker-sep">│</span>
        <span class="pt-ticker-label">EPOCH</span>&nbsp;<span class="pt-ticker-val" id="ttape-epoch">—</span>
        <span class="pt-ticker-spacer"></span>
        <a class="pt-ticker-brand" href="https://grahamsnumberplus1.com" target="_blank" rel="noopener noreferrer"
           title="PoolTerminal - visit grahamsnumberplus1.com"
           style="color: #4ade80; text-decoration: none; font-size: 11px; letter-spacing: 0.04em; white-space: nowrap; opacity: 0.9; font-weight: 500;">PoolTerminal <span id="ttape-appver">v0.1.0</span> · developed by GrahamsNumberPlus1</a>
        <span class="pt-ticker-spacer"></span>
        <span class="pt-mode-badge" id="ttape-mode" title="Live connection status">● LIVE</span>
        <button class="pt-reconnect-btn" id="ttape-reconnect" type="button" title="Disconnect or change the connected node">Disconnect / Change Node</button>
        <span class="pt-settings-gear" id="ttape-settings" title="Settings" style="cursor:pointer; margin-left:10px; font-size:21px; color:#c4ccd8; user-select:none;">⚙</span>
      </div>

      <nav class="pt-tabs" id="pt-tabs">
        <!-- Temp tab (data-view="now") removed from nav; view code retained in now.js -->
        <div class="pt-tab pt-tab-active" data-view="now2">Dashboard</div>
        <div class="pt-tab" data-view="history">History</div>
        <div class="pt-tab" data-view="delegators">Delegators</div>
        <div class="pt-tab" data-view="notifications">Notifications <span class="pt-tab-badge" id="pt-notif-badge"></span></div>
        <div class="pt-tab" data-view="node-health">Node health</div>
        <div class="pt-tab" data-view="data">Data</div>
        <div class="pt-tab" data-view="map">Map</div>
        <div class="pt-tab" data-view="relay1">Relay 1</div>
        <div class="pt-tab" data-view="relay2">Relay 2</div>
      </nav>

      <main class="pt-canvas" id="pt-canvas">
        <div class="pt-placeholder">
          <h2>Phase 0 — scaffold ready</h2>
          <p>Tauri 2 + design tokens + chrome shell wired.</p>
          <p>Phase 1 (NOW view + data layer) starts next.</p>
        </div>
      </main>

    </div>

  </body>
</html>
